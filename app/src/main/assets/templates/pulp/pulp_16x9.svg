    <g id="full_path"><rect x="49.5" y="829.5" width="1280" height="220" stroke="#FFEFBF" stroke-width="5"/></g>
    <g id="line"><rect x="49.5" y="829.5" width="1280" height="220" stroke="#FFBE00" stroke-width="5"/></g>
    <g id="area"><rect x="47" y="827" width="1286" height="226" fill="#FFBE00" fill-opacity="0.3"/></g>
  </g>

  <!-- Route map -->
  <g id="route_map">
    <g id="glow_2"><circle cx="1620" cy="780" r="7.5" fill="#FFBE00" fill-opacity="0.3"/></g>
    <g id="dot_2"><circle cx="1620" cy="780" r="3.5" fill="#FFBE00"/></g>
    <g id="full_route"><rect x="1379.5" y="579.5" width="440" height="420" stroke="#FFEFBF" stroke-width="5"/></g>
    <g id="route"><rect x="1379.5" y="579.5" width="440" height="420" stroke="#FFBE00" stroke-width="5"/></g>
  </g>
</g>
