<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
<g id="overlay_16x9">
  <!-- Title -->
  <text id="title_text" fill="#FFBE00" stroke="black" style="white-space: pre" stroke-width="3" xml:space="preserve" font-family="Climate Crisis" font-size="65" letter-spacing="0em"><tspan x="80" y="95">Test Run</tspan></text>

  <!-- Stats: right-aligned column -->
  <text id="stat_hr" fill="white" stroke="black" style="white-space: pre" stroke-width="3" xml:space="preserve" font-family="Climate Crisis" font-size="48" letter-spacing="0em" text-anchor="end"><tspan x="1870" y="150">130</tspan></text>
  <text id="label_hr" fill="#FFBE00" stroke="black" style="white-space: pre" stroke-width="2" xml:space="preserve" font-family="Climate Crisis" font-size="32" letter-spacing="0em" text-anchor="end"><tspan x="1870" y="190">HR</tspan></text>

  <text id="stat_distance" fill="white" stroke="black" style="white-space: pre" stroke-width="3" xml:space="preserve" font-family="Climate Crisis" font-size="48" letter-spacing="0em" text-anchor="end"><tspan x="1870" y="275">10.0</tspan></text>
  <text id="label_distance" fill="#FFBE00" stroke="black" style="white-space: pre" stroke-width="2" xml:space="preserve" font-family="Climate Crisis" font-size="32" letter-spacing="0em" text-anchor="end"><tspan x="1870" y="315">DIST</tspan></text>

  <text id="stat_time" fill="white" stroke="black" style="white-space: pre" stroke-width="3" xml:space="preserve" font-family="Climate Crisis" font-size="48" letter-spacing="0em" text-anchor="end"><tspan x="1870" y="400">10:00:00</tspan></text>
  <text id="label_time" fill="#FFBE00" stroke="black" style="white-space: pre" stroke-width="2" xml:space="preserve" font-family="Climate Crisis" font-size="32" letter-spacing="0em" text-anchor="end"><tspan x="1870" y="440">TIME</tspan></text>

  <text id="stat_pace" fill="white" stroke="black" style="white-space: pre" stroke-width="3" xml:space="preserve" font-family="Climate Crisis" font-size="48" letter-spacing="0em" text-anchor="end"><tspan x="1870" y="525">05:00</tspan></text>
  <text id="label_pace" fill="#FFBE00" stroke="black" style="white-space: pre" stroke-width="2" xml:space="preserve" font-family="Climate Crisis" font-size="32" letter-spacing="0em" text-anchor="end"><tspan x="1870" y="565">PACE</tspan></text>

  <!-- Elevation chart -->
  <g id="elevation_chart">
    <g id="glow"><circle cx="120" cy="880" r="7.5" fill="#FFBE00" fill-opacity="0.3"/></g>
