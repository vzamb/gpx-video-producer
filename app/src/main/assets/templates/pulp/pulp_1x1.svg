<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
<g id="overlay_1x1">
  <!-- Title -->
  <text id="title_text" fill="#FFBE00" stroke="black" style="white-space: pre" stroke-width="3" xml:space="preserve" font-family="Climate Crisis" font-size="58" letter-spacing="0em"><tspan x="50" y="85">Test Run</tspan></text>

  <!-- Stats: right-aligned column -->
  <text id="stat_hr" fill="white" stroke="black" style="white-space: pre" stroke-width="3" xml:space="preserve" font-family="Climate Crisis" font-size="42" letter-spacing="0em" text-anchor="end"><tspan x="1030" y="140">130</tspan></text>
  <text id="label_hr" fill="#FFBE00" stroke="black" style="white-space: pre" stroke-width="2" xml:space="preserve" font-family="Climate Crisis" font-size="28" letter-spacing="0em" text-anchor="end"><tspan x="1030" y="175">HR</tspan></text>

  <text id="stat_distance" fill="white" stroke="black" style="white-space: pre" stroke-width="3" xml:space="preserve" font-family="Climate Crisis" font-size="42" letter-spacing="0em" text-anchor="end"><tspan x="1030" y="260">10.0</tspan></text>
  <text id="label_distance" fill="#FFBE00" stroke="black" style="white-space: pre" stroke-width="2" xml:space="preserve" font-family="Climate Crisis" font-size="28" letter-spacing="0em" text-anchor="end"><tspan x="1030" y="295">DIST</tspan></text>

  <text id="stat_time" fill="white" stroke="black" style="white-space: pre" stroke-width="3" xml:space="preserve" font-family="Climate Crisis" font-size="42" letter-spacing="0em" text-anchor="end"><tspan x="1030" y="380">10:00:00</tspan></text>
  <text id="label_time" fill="#FFBE00" stroke="black" style="white-space: pre" stroke-width="2" xml:space="preserve" font-family="Climate Crisis" font-size="28" letter-spacing="0em" text-anchor="end"><tspan x="1030" y="415">TIME</tspan></text>

  <text id="stat_pace" fill="white" stroke="black" style="white-space: pre" stroke-width="3" xml:space="preserve" font-family="Climate Crisis" font-size="42" letter-spacing="0em" text-anchor="end"><tspan x="1030" y="500">05:00</tspan></text>
  <text id="label_pace" fill="#FFBE00" stroke="black" style="white-space: pre" stroke-width="2" xml:space="preserve" font-family="Climate Crisis" font-size="28" letter-spacing="0em" text-anchor="end"><tspan x="1030" y="535">PACE</tspan></text>

  <!-- Elevation chart -->
  <g id="elevation_chart">
    <g id="glow"><circle cx="100" cy="910" r="7.5" fill="#FFBE00" fill-opacity="0.3"/></g>
    <g id="dot"><circle cx="100" cy="910" r="3.5" fill="#FFBE00"/></g>
    <g id="full_path"><rect x="19.5" y="869.5" width="1033" height="190" stroke="#FFEFBF" stroke-width="5"/></g>
    <g id="line"><rect x="19.5" y="869.5" width="1033" height="190" stroke="#FFBE00" stroke-width="5"/></g>
    <g id="area"><rect x="17" y="867" width="1038" height="196" fill="#FFBE00" fill-opacity="0.3"/></g>
  </g>

  <!-- Route map -->
  <g id="route_map">
    <g id="glow_2"><circle cx="830" cy="720" r="7.5" fill="#FFBE00" fill-opacity="0.3"/></g>
    <g id="dot_2"><circle cx="830" cy="720" r="3.5" fill="#FFBE00"/></g>
    <g id="full_route"><rect x="609.5" y="579.5" width="420" height="280" stroke="#FFEFBF" stroke-width="5"/></g>
    <g id="route"><rect x="609.5" y="579.5" width="420" height="280" stroke="#FFBE00" stroke-width="5"/></g>
  </g>
</g>
</svg>
