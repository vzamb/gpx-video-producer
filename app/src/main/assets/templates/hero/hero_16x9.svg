<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">

  <!-- Title -->
  <text id="title_text" x="960" y="47" font-family="sans-serif" font-size="59" fill="#448AFF" text-anchor="middle">Activity Title</text>

  <!-- Route Map -->
  <g id="route_map" transform="translate(1404, 0)">
    <rect id="background" x="0" y="0" width="320" height="320" rx="24" fill="#1A1A2E" fill-opacity="0.6"/>
    <polyline id="line" points="" fill="none" stroke="#FF5722" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon id="area" points="" fill="#FF5722" fill-opacity="0.15"/>
    <path id="full_path" d="" fill="none" stroke="#FF5722" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle id="dot" cx="0" cy="0" r="6" fill="#FF5722"/>
    <circle id="glow" cx="0" cy="0" r="12" fill="#FF5722" fill-opacity="0.3"/>
  </g>

  <!-- Distance Label -->
  <text id="label_distance" x="960" y="386" font-family="sans-serif" font-size="53" fill="#448AFF" text-anchor="middle">DISTANCE</text>

  <!-- Hero Distance Stat -->
  <text id="stat_distance" x="960" y="568" font-family="sans-serif" font-size="299" font-weight="bold" fill="#FFFFFF" text-anchor="middle">0.0</text>

  <!-- Distance Unit -->
  <text id="stat_distance_unit" x="960" y="701" font-family="sans-serif" font-size="85" font-weight="bold" fill="#FFFFFF" text-anchor="middle">KM</text>

  <!-- Elevation Card -->
  <rect id="card_elevation" x="85" y="573" width="555" height="320" rx="53" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="1.5"/>
  <text id="label_elevation" x="363" y="632" font-family="sans-serif" font-size="43" fill="#66BB6A" text-anchor="middle">ELEVATION</text>
  <text id="stat_elevation" x="363" y="760" font-family="sans-serif" font-size="85" font-weight="bold" fill="#FFFFFF" text-anchor="middle">↑ 0</text>

  <!-- Time Card -->
  <rect id="card_time" x="683" y="573" width="555" height="320" rx="53" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="1.5"/>
  <text id="label_time" x="960" y="632" font-family="sans-serif" font-size="43" fill="#26A69A" text-anchor="middle">TIME</text>
  <text id="stat_time" x="960" y="760" font-family="sans-serif" font-size="85" font-weight="bold" fill="#FFFFFF" text-anchor="middle">0:00</text>

  <!-- Heart Rate Card -->
  <rect id="card_hr" x="1280" y="573" width="555" height="320" rx="53" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="1.5"/>
  <text id="label_hr" x="1558" y="632" font-family="sans-serif" font-size="43" fill="#EF5350" text-anchor="middle">HEART RATE</text>
  <text id="stat_hr" x="1558" y="760" font-family="sans-serif" font-size="85" font-weight="bold" fill="#FFFFFF" text-anchor="middle">—</text>

  <!-- Elevation Chart -->
  <g id="elevation_chart" transform="translate(85, 955)">
    <rect id="background" x="0" y="0" width="1750" height="120" rx="16" fill="#1A1A2E" fill-opacity="0.6"/>
    <polyline id="line" points="" fill="none" stroke="#448AFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon id="area" points="" fill="#448AFF" fill-opacity="0.2"/>
    <path id="full_path" d="" fill="none" stroke="#448AFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle id="dot" cx="0" cy="0" r="5" fill="#448AFF"/>
    <circle id="glow" cx="0" cy="0" r="10" fill="#448AFF" fill-opacity="0.3"/>
  </g>

</svg>
