<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <text id="title_text" x="55" y="100" font-family="sans-serif" font-size="48" font-weight="bold" fill="#20B478" text-anchor="start">ACTIVITY</text>

  <g id="route_map" transform="translate(680,824)">
    <rect id="background" x="0" y="0" width="360" height="568" rx="8" ry="8"
          fill="#0A0A1A" fill-opacity="0.8"/>
    <line id="line" x1="0" y1="0" x2="360" y2="0" stroke="#44DD77" stroke-width="2"/>
    <rect id="area" x="0" y="0" width="360" height="568" fill="#44DD77" fill-opacity="0.2"/>
    <line id="full_path" x1="0" y1="0" x2="360" y2="0" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.15"/>
    <circle id="dot" cx="0" cy="0" r="6" fill="#44DD77"/>
    <circle id="glow" cx="0" cy="0" r="12" fill="#44DD77" fill-opacity="0.3"/>
  </g>

  <rect id="card_distance" x="855" y="860" width="200" height="110" rx="16" ry="16" fill="#000000" fill-opacity="0.7"/>
  <text id="label_distance" x="1045" y="890" font-family="sans-serif" font-size="17" fill="#20B478" text-anchor="end">DISTANCE</text>
  <text id="stat_distance" x="955" y="940" font-family="sans-serif" font-size="42" font-weight="bold" fill="#FFFFFF" text-anchor="middle">0</text>
  <rect id="card_elevation" x="855" y="655" width="200" height="110" rx="16" ry="16" fill="#000000" fill-opacity="0.7"/>
  <text id="label_elevation" x="1045" y="685" font-family="sans-serif" font-size="17" fill="#20B478" text-anchor="end">ELEVATION</text>
  <text id="stat_elevation" x="955" y="735" font-family="sans-serif" font-size="42" font-weight="bold" fill="#FFFFFF" text-anchor="middle">0</text>
  <rect id="card_pace" x="855" y="450" width="200" height="110" rx="16" ry="16" fill="#000000" fill-opacity="0.7"/>
  <text id="label_pace" x="1045" y="480" font-family="sans-serif" font-size="17" fill="#20B478" text-anchor="end">PACE</text>
  <text id="stat_pace" x="955" y="530" font-family="sans-serif" font-size="42" font-weight="bold" fill="#FFFFFF" text-anchor="middle">0</text>
  <rect id="card_time" x="855" y="245" width="200" height="110" rx="16" ry="16" fill="#000000" fill-opacity="0.7"/>
  <text id="label_time" x="1045" y="275" font-family="sans-serif" font-size="17" fill="#20B478" text-anchor="end">TIME</text>
  <text id="stat_time" x="955" y="325" font-family="sans-serif" font-size="42" font-weight="bold" fill="#FFFFFF" text-anchor="middle">0</text>
  <rect id="card_hr" x="855" y="40" width="200" height="110" rx="16" ry="16" fill="#000000" fill-opacity="0.7"/>
  <text id="label_hr" x="1045" y="70" font-family="sans-serif" font-size="17" fill="#20B478" text-anchor="end">HR</text>
  <text id="stat_hr" x="955" y="120" font-family="sans-serif" font-size="42" font-weight="bold" fill="#FFFFFF" text-anchor="middle">0</text>

  <g id="elevation_chart" transform="translate(10,1477)">
    <rect id="background" x="0" y="0" width="1049" height="468" rx="8" ry="8"
          fill="#0A0A1A" fill-opacity="0.2"/>
    <line id="line" x1="0" y1="0" x2="1049" y2="0" stroke="#44DD77" stroke-width="2"/>
    <rect id="area" x="0" y="0" width="1049" height="468" fill="#44DD77" fill-opacity="0.2"/>
    <line id="full_path" x1="0" y1="0" x2="1049" y2="0" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.15"/>
    <circle id="dot" cx="0" cy="0" r="6" fill="#44DD77"/>
    <circle id="glow" cx="0" cy="0" r="12" fill="#44DD77" fill-opacity="0.3"/>
  </g>
</svg>