<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="scrim_grad" x1="0" y1="0.45" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.75"/>
    </linearGradient>
  </defs>
  <rect id="scrim" x="0" y="540" width="1080" height="540" fill="url(#scrim_grad)"/>

  <text id="title_text" x="48" y="90" font-family="sans-serif" font-size="42" font-weight="bold" fill="#FFFFFF" text-anchor="start">Activity Title</text>

  <g id="route_map" transform="translate(534,28)">
    <rect id="background" x="0" y="0" width="340" height="340" rx="8" ry="8"
          fill="#0A0A1A" fill-opacity="0.6"/>
    <line id="line" x1="0" y1="0" x2="340" y2="0" stroke="#FF5722" stroke-width="2"/>
    <rect id="area" x="0" y="0" width="340" height="340" fill="#FF5722" fill-opacity="0.2"/>
    <line id="full_path" x1="0" y1="0" x2="340" y2="0" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.15"/>
    <circle id="dot" cx="0" cy="0" r="6" fill="#FF5722"/>
    <circle id="glow" cx="0" cy="0" r="12" fill="#FF5722" fill-opacity="0.3"/>
  </g>

  <rect id="card_distance" x="48" y="600" width="480" height="210" rx="36" ry="36" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="1.5"/>
  <text id="metric_1_label" x="84" y="648" font-family="sans-serif" font-size="27" fill="#448AFF" fill-opacity="0.9" text-anchor="start">DISTANCE</text>
  <text id="metric_1_value" x="84" y="744" font-family="sans-serif" font-size="84" font-weight="bold" fill="#FFFFFF" text-anchor="start">0.0</text>
  <text id="metric_1_unit" x="456" y="744" font-family="sans-serif" font-size="30" fill="#FFFFFF" fill-opacity="0.7" text-anchor="start">km</text>

  <rect id="card_elevation" x="48" y="828" width="204" height="150" rx="30" ry="30" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="1.5"/>
  <text id="metric_2_label" x="72" y="870" font-family="sans-serif" font-size="24" fill="#66BB6A" fill-opacity="0.9" text-anchor="start">ELEV</text>
  <text id="metric_2_value" x="72" y="930" font-family="sans-serif" font-size="39" font-weight="bold" fill="#FFFFFF" text-anchor="start">↑ 0</text>

  <rect id="card_pace" x="270" y="828" width="204" height="150" rx="30" ry="30" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="1.5"/>
  <text id="metric_3_label" x="294" y="870" font-family="sans-serif" font-size="24" fill="#FFAB40" fill-opacity="0.9" text-anchor="start">PACE</text>
  <text id="metric_3_value" x="294" y="930" font-family="sans-serif" font-size="39" font-weight="bold" fill="#FFFFFF" text-anchor="start">—</text>

  <rect id="card_hr" x="492" y="828" width="204" height="150" rx="30" ry="30" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="1.5"/>
  <text id="metric_4_label" x="516" y="870" font-family="sans-serif" font-size="24" fill="#EF5350" fill-opacity="0.9" text-anchor="start">HR</text>
  <text id="metric_4_value" x="516" y="930" font-family="sans-serif" font-size="39" font-weight="bold" fill="#FFFFFF" text-anchor="start">—</text>

  <g id="elevation_chart" transform="translate(48,962)">
    <rect id="background" x="0" y="0" width="924" height="90" rx="8" ry="8"
          fill="#0A0A1A" fill-opacity="0.6"/>
    <line id="line" x1="0" y1="0" x2="924" y2="0" stroke="#448AFF" stroke-width="2"/>
    <rect id="area" x="0" y="0" width="924" height="90" fill="#448AFF" fill-opacity="0.2"/>
    <line id="full_path" x1="0" y1="0" x2="924" y2="0" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.15"/>
    <circle id="dot" cx="0" cy="0" r="6" fill="#448AFF"/>
    <circle id="glow" cx="0" cy="0" r="12" fill="#448AFF" fill-opacity="0.3"/>
  </g>
</svg>