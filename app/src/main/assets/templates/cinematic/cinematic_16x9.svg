<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="scrim_grad" x1="0" y1="0.1" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.75"/>
    </linearGradient>
  </defs>
  <rect id="scrim" x="0" y="120" width="1920" height="960" fill="url(#scrim_grad)"/>

  <text id="title_text" x="85" y="160" font-family="sans-serif" font-size="75" font-weight="bold" fill="#FFFFFF" text-anchor="start">Activity Title</text>

  <g id="route_map" transform="translate(1404,28)">
    <rect id="background" x="0" y="0" width="320" height="320" rx="8" ry="8"
          fill="#0A0A1A" fill-opacity="0.6"/>
    <line id="line" x1="0" y1="0" x2="320" y2="0" stroke="#FF5722" stroke-width="2"/>
    <rect id="area" x="0" y="0" width="320" height="320" fill="#FF5722" fill-opacity="0.2"/>
    <line id="full_path" x1="0" y1="0" x2="320" y2="0" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.15"/>
    <circle id="dot" cx="0" cy="0" r="6" fill="#FF5722"/>
    <circle id="glow" cx="0" cy="0" r="12" fill="#FF5722" fill-opacity="0.3"/>
  </g>

  <rect id="card_distance" x="85" y="226" width="853" height="373" rx="64" ry="64" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="1.5"/>
  <text id="metric_1_label" x="149" y="311" font-family="sans-serif" font-size="48" fill="#448AFF" fill-opacity="0.9" text-anchor="start">DISTANCE</text>
  <text id="metric_1_value" x="149" y="482" font-family="sans-serif" font-size="149" font-weight="bold" fill="#FFFFFF" text-anchor="start">0.0</text>
  <text id="metric_1_unit" x="810" y="482" font-family="sans-serif" font-size="53" fill="#FFFFFF" fill-opacity="0.7" text-anchor="start">km</text>

  <rect id="card_elevation" x="85" y="631" width="362" height="266" rx="53" ry="53" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="1.5"/>
  <text id="metric_2_label" x="128" y="706" font-family="sans-serif" font-size="43" fill="#66BB6A" fill-opacity="0.9" text-anchor="start">ELEV</text>
  <text id="metric_2_value" x="128" y="812" font-family="sans-serif" font-size="69" font-weight="bold" fill="#FFFFFF" text-anchor="start">↑ 0</text>

  <rect id="card_pace" x="479" y="631" width="362" height="266" rx="53" ry="53" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="1.5"/>
  <text id="metric_3_label" x="522" y="706" font-family="sans-serif" font-size="43" fill="#FFAB40" fill-opacity="0.9" text-anchor="start">PACE</text>
  <text id="metric_3_value" x="522" y="812" font-family="sans-serif" font-size="69" font-weight="bold" fill="#FFFFFF" text-anchor="start">—</text>

  <rect id="card_hr" x="873" y="631" width="362" height="266" rx="53" ry="53" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="1.5"/>
  <text id="metric_4_label" x="916" y="706" font-family="sans-serif" font-size="43" fill="#EF5350" fill-opacity="0.9" text-anchor="start">HR</text>
  <text id="metric_4_value" x="916" y="812" font-family="sans-serif" font-size="69" font-weight="bold" fill="#FFFFFF" text-anchor="start">—</text>

  <g id="elevation_chart" transform="translate(85,900)">
    <rect id="background" x="0" y="0" width="1641" height="160" rx="8" ry="8"
          fill="#0A0A1A" fill-opacity="0.6"/>
    <line id="line" x1="0" y1="0" x2="1641" y2="0" stroke="#448AFF" stroke-width="2"/>
    <rect id="area" x="0" y="0" width="1641" height="160" fill="#448AFF" fill-opacity="0.2"/>
    <line id="full_path" x1="0" y1="0" x2="1641" y2="0" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.15"/>
    <circle id="dot" cx="0" cy="0" r="6" fill="#448AFF"/>
    <circle id="glow" cx="0" cy="0" r="12" fill="#448AFF" fill-opacity="0.3"/>
  </g>
</svg>