<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect id="dashboard_bg" x="0" y="594" width="1920" height="486" fill="#000000" fill-opacity="0.55"/>

  <text id="title_text" x="64" y="139" font-family="sans-serif" font-size="64" font-weight="bold" fill="#FFFFFF" text-anchor="start">Activity Title</text>

  <g id="route_map" transform="translate(1404,28)">
    <rect id="background" x="0" y="0" width="320" height="320" rx="8" ry="8"
          fill="#0A0A1A" fill-opacity="0.6"/>
    <line id="line" x1="0" y1="0" x2="320" y2="0" stroke="#FF5722" stroke-width="2"/>
    <rect id="area" x="0" y="0" width="320" height="320" fill="#FF5722" fill-opacity="0.2"/>
    <line id="full_path" x1="0" y1="0" x2="320" y2="0" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.15"/>
    <circle id="dot" cx="0" cy="0" r="6" fill="#FF5722"/>
    <circle id="glow" cx="0" cy="0" r="12" fill="#FF5722" fill-opacity="0.3"/>
  </g>

  <rect id="card_distance" x="43" y="608" width="896" height="256" rx="43" ry="43" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="1"/>
  <text id="label_distance" x="96" y="680" font-family="sans-serif" font-size="43" fill="#448AFF" fill-opacity="0.9" text-anchor="start">DISTANCE</text>
  <text id="stat_distance" x="96" y="780" font-family="sans-serif" font-size="75" font-weight="bold" fill="#FFFFFF" text-anchor="start">0.0 km</text>

  <rect id="card_elevation" x="970" y="608" width="896" height="256" rx="43" ry="43" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="1"/>
  <text id="label_elevation" x="1024" y="680" font-family="sans-serif" font-size="43" fill="#66BB6A" fill-opacity="0.9" text-anchor="start">ELEVATION</text>
  <text id="stat_elevation" x="1024" y="780" font-family="sans-serif" font-size="75" font-weight="bold" fill="#FFFFFF" text-anchor="start">↑ 0 m</text>

  <rect id="card_pace" x="43" y="896" width="432" height="144" rx="24" ry="24" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="1"/>
  <text id="label_pace" x="96" y="938" font-family="sans-serif" font-size="36" fill="#FFAB40" fill-opacity="0.9" text-anchor="start">PACE</text>
  <text id="stat_pace" x="96" y="998" font-family="sans-serif" font-size="54" font-weight="bold" fill="#FFFFFF" text-anchor="start">—</text>

  <rect id="card_hr" x="507" y="896" width="432" height="144" rx="24" ry="24" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="1"/>
  <text id="label_hr" x="560" y="938" font-family="sans-serif" font-size="36" fill="#EF5350" fill-opacity="0.9" text-anchor="start">HR</text>
  <text id="stat_hr" x="560" y="998" font-family="sans-serif" font-size="54" font-weight="bold" fill="#FFFFFF" text-anchor="start">—</text>

  <rect id="card_time" x="971" y="896" width="432" height="144" rx="24" ry="24" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="1"/>
  <text id="label_time" x="1024" y="938" font-family="sans-serif" font-size="36" fill="#26A69A" fill-opacity="0.9" text-anchor="start">TIME</text>
  <text id="stat_time" x="1024" y="998" font-family="sans-serif" font-size="54" font-weight="bold" fill="#FFFFFF" text-anchor="start">0:00</text>

  <rect id="card_grade" x="1435" y="896" width="432" height="144" rx="24" ry="24" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="1"/>
  <text id="label_grade" x="1488" y="938" font-family="sans-serif" font-size="36" fill="#9C27B0" fill-opacity="0.9" text-anchor="start">GRADE</text>
  <text id="stat_grade" x="1488" y="998" font-family="sans-serif" font-size="54" font-weight="bold" fill="#FFFFFF" text-anchor="start">0.0%</text>

  <g id="elevation_chart" transform="translate(43,1010)">
    <rect id="background" x="0" y="0" width="1835" height="55" rx="8" ry="8"
          fill="#0A0A1A" fill-opacity="0.6"/>
    <line id="line" x1="0" y1="0" x2="1835" y2="0" stroke="#448AFF" stroke-width="2"/>
    <rect id="area" x="0" y="0" width="1835" height="55" fill="#448AFF" fill-opacity="0.2"/>
    <line id="full_path" x1="0" y1="0" x2="1835" y2="0" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.15"/>
    <circle id="dot" cx="0" cy="0" r="6" fill="#448AFF"/>
    <circle id="glow" cx="0" cy="0" r="12" fill="#448AFF" fill-opacity="0.3"/>
  </g>
</svg>